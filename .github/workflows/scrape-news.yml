name: Scrape News 📡

on:
  schedule:
    - cron: '* * * * *' # Run every minute (GitHub's minimum)
  repository_dispatch:
    types: [trigger-scrape]
  workflow_dispatch: # Allow manual run

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SCRAPEDO_TOKEN: ${{ secrets.SCRAPEDO_TOKEN }}
        run: |
          node scripts/scrape.js

      - name: Wake up Proxy
        run: curl -s https://ras-mirqab-proxy.onrender.com/health || true

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/news-live.json
          git add public/data/media/* || echo "No new media"
          git commit -m "📡 Update news feed & media [skip ci]" || echo "No changes to commit"
          git push
