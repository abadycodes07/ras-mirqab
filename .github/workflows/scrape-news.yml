name: Scrape News 📡

on:
  schedule:
    - cron: '* * * * *' # Run every minute (GitHub's minimum)
  workflow_dispatch: # Allow manual run

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Scraper
        run: timeout 180 node scripts/scrape.js || echo "⚠️ Scraper timed out but continuing with partial data"

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/news-live.json
          git add public/data/media/* || echo "No new media"
          git commit -m "📡 Update news feed & media [skip ci]" || echo "No changes to commit"
          git push
