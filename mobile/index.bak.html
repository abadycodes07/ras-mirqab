<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>راس مرقاب — V44 PREMIUM</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="mobile.css?v=44">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  
  <script src="../src/assets/three.min.js"></script>
  <script src="../src/assets/globe.gl.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <script src="../src/data/feeds.js?v=44"></script>
  <script src="../src/data/conflicts.js?v=44"></script>
  <script src="../src/data/intelligence.js?v=44"></script>
  <script src="../src/data/timezones.js?v=44"></script>
  <script src="../src/globe.js?v=44"></script>
  <script src="../src/widgets/breaking-news.js?v=44"></script>
</head>
<body class="mobile-v44">

  <!-- ═══ PREMIUM HEADER ═══ -->
  <header class="mobile-header">
    <div class="header-left">
       <div class="logo-group" id="logo-trigger" style="position:relative;">
           <img src="../public/logo.png" class="header-logo" alt="Logo">
           <div id="show-map-bookmark" class="show-map-bookmark hidden">
               <span>عرض الخريطة</span>
               <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" style="transform:rotate(180deg)"><path d="M7 10l5 5 5-5z"/></svg>
           </div>
       </div>
    </div>
    <div class="header-right">
      <div class="notif-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 22a2.01 2.01 0 002-2h-4a2.01 2.01 0 002 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      </div>
    </div>
  </header>

  <!-- ═══ GLOBE HERO (MINIMIZABLE) ═══ -->
  <section class="globe-section" id="globe-section">
    <div id="globe-container"></div>
    <div id="map-container" class="hidden"></div>

    <div class="globe-controls">
      <!-- Bottom Left Cluster -->
      <div class="left-controls">
        <div class="mode-toggle">
            <button class="mode-btn active" id="btn-3d">3D</button>
            <button class="mode-btn" id="btn-2d">2D</button>
        </div>
        <button class="hide-map-btn" id="btn-hide-map">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14z"/></svg>
            <span>Hide Map ^</span>
        </button>
      </div>

      <!-- Bottom Right -->
      <button class="layers-trigger" id="btn-layers">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 16L1 9l11-7 11 7-11 7zm0 2.3l9-5.7v2.3l-9 5.8-9-5.8v-2.3l9 5.7z"/></svg>
          <span>الطبقات</span>
      </button>
    </div>
  </section>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main class="content-area">
    
    <!-- Breaking News -->
    <div class="glass-container" style="margin-bottom:20px;">
      <div class="section-header">
        <div class="hard-sync" onclick="location.reload(true)">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          <span>hard sync</span>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <span>الأخبار العاجلة</span>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </div>
      </div>
      <h2 style="color:var(--accent); font-size:24px; font-weight:900; margin:10px 0;">عاجل</h2>
      <div id="breaking-news-body" class="breaking-news-grid">
        <!-- Dyn. -->
      </div>
    </div>

    <!-- Live Streams -->
    <h3 class="section-header" style="justify-content:flex-end;">البث المباشر</h3>
    <div class="tv-carousel" id="tv-carousel">
      <!-- Dyn. -->
    </div>

    <!-- Widgets Grid -->
    <div class="widgets-grid" id="widgets-grid">
      <!-- Market -->
      <div class="glass-container widget-card">
        <div class="w-title">
            <span>الذهب والعملات</span>
            <span class="w-badge">T7</span>
        </div>
        <div id="widget-market-chart" style="flex:1; background:rgba(255,112,26,0.05); border-radius:8px;"></div>
      </div>
      
      <!-- Clocks -->
      <div class="glass-container widget-card">
        <div class="w-title">
            <span>توقيت العالم</span>
            <span class="w-badge">T7</span>
        </div>
        <div id="widget-clocks-list" style="font-size:12px; display:flex; flex-direction:column; gap:4px;"></div>
      </div>

      <!-- Tracer -->
      <div class="glass-container widget-card">
        <div class="w-title">
            <span>تتبع التحركات</span>
            <span class="w-badge">T7</span>
        </div>
        <div style="flex:1; background:#111; border-radius:8px; overflow:hidden;">
            <img src="https://api.placeholder.com/150/150" style="width:100%; height:100%; object-fit:cover; opacity:0.5;">
        </div>
      </div>

      <!-- Cyber -->
      <div class="glass-container widget-card">
        <div class="w-title">
            <span>الاستخبارات السيبرانية</span>
            <span class="w-badge">T7</span>
        </div>
        <div style="flex:1; background:#000; border-radius:8px; padding:5px;">
            <div style="width:100%; height:100%; background:radial-gradient(circle, var(--accent) 0%, transparent 70%); opacity:0.3;"></div>
        </div>
      </div>

      <!-- Camera -->
      <div class="glass-container widget-card" style="grid-column: span 2;">
        <div class="w-title">
            <span>كاميرا مباشرة</span>
            <span class="w-badge">T7</span>
        </div>
        <div style="height:120px; background:#222; border-radius:8px; position:relative;">
            <div style="position:absolute; bottom:10px; right:10px; display:flex; gap:10px;">
                <span style="background:rgba(0,0,0,0.5); padding:4px; border-radius:50%;">🔔</span>
                <span style="background:rgba(0,0,0,0.5); padding:4px; border-radius:50%;">👍</span>
            </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Layers Modal -->
  <div id="layers-modal" class="layers-modal hidden">
    <div class="modal-header">
      <span>الطبقات</span>
      <span class="close-modal" id="close-layers">×</span>
    </div>
    <div id="layers-list"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="nav-item"><span>الإعدادات</span></div>
    <div class="nav-item"><span>التقارير</span></div>
    <div class="nav-item"><span>المخططات</span></div>
    <div class="nav-item"><span>الأصول</span></div>
    <div class="nav-item"><span>الأخبار</span></div>
    <div class="nav-item active"><span>الرئيسية</span></div>
  </nav>

  <!-- Video PiP Target -->
  <div id="video-carousel-container" style="display:none"></div>

  <script src="mobile.js?v=44"></script>
</body>
</html>
