<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>راس مرقاب — Mobile</title>
    <meta name="description" content="راس مرقاب — Mobile Dashboard">

    <!-- Redirect desktop users back -->
    <script>
        if (!/Mobi|Android|iPhone|iPad|iPod|Touch/i.test(navigator.userAgent) && window.innerWidth >= 1024 && !location.search.includes('mobile=true')) {
            location.replace('../' + location.hash);
        }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Our Styles -->
    <link rel="stylesheet" href="style.css?v=57">
    <link rel="icon" type="image/png" href="../public/logo.png">
</head>
<body>

<!-- ═══════════════════════════════════════════
     HEADER (Logo + Bell)
═══════════════════════════════════════════ -->
<header class="site-header">
    <!-- Right: Logo -->
    <div>
        <span class="logo-word">راس مرقاب</span>
    </div>

    <!-- Left: Bell + dropdown -->
    <div class="bell-wrap">
        <button class="bell-btn glass" id="bell-btn" title="الإشعارات">
            <i class="fas fa-bell"></i>
        </button>
        <div class="notif-dropdown glass" id="notif-panel">
            <h4>إعدادات الإشعارات</h4>
            <div class="notif-row">
                <label>الإشعارات المرئية</label>
                <label class="sw">
                    <input type="checkbox" id="sw-visual" checked>
                    <div class="sw-track"></div>
                </label>
            </div>
            <div class="notif-row">
                <label>الإشعارات الصوتية</label>
                <label class="sw">
                    <input type="checkbox" id="sw-audio" checked>
                    <div class="sw-track"></div>
                </label>
            </div>
            <div class="notif-row" style="flex-direction:column; align-items:flex-end; gap:8px;">
                <label style="font-size:11px;">مستوى الصوت</label>
                <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="70">
            </div>
        </div>
    </div>
</header>

<!-- ─── "Show Map" bookmark (appears when map is hidden) ─── -->
<div class="show-map-bm glass" id="show-map-bm">
    <i class="fas fa-bookmark"></i>
    عرض الخريطة
</div>

<!-- ═══════════════════════════════════════════
     GLOBE SECTION
═══════════════════════════════════════════ -->
<section class="globe-wrap" id="globe-wrap">
    <div id="globe-container"></div>

    <!-- Floating Controls -->
    <div class="globe-controls">
        <button class="pill glass" id="pill-layers">
            <i class="fas fa-layer-group"></i>
            <span>الطبقات</span>
        </button>
        <div class="dim-toggle glass">
            <button class="dim-btn active" id="btn-3d" data-view="3d">3D</button>
            <button class="dim-btn" id="btn-2d" data-view="2d">2D</button>
        </div>
        <button class="pill glass" id="pill-hidemap">
            <span>إخفاء الخريطة</span>
            <i class="fas fa-chevron-up"></i>
        </button>
    </div>
</section>

<!-- ═══════════════════════════════════════════
     CONTENT AREA
═══════════════════════════════════════════ -->
<div class="content-area">

    <!-- ─── BREAKING NEWS ─── -->
    <section class="card-aajal glass">
        <!-- Top row -->
        <div class="aajal-top">
            <button class="sync-btn" id="sync-btn">
                <i class="fas fa-sync-alt"></i>
                hard sync
                <span style="opacity:0.4; font-size:8px;">v57</span>
            </button>
            <div class="aajal-heading-r">
                <span>الأخبار العاجلة</span>
                <i class="fas fa-search"></i>
            </div>
        </div>

        <!-- Title -->
        <div class="urgent-title">عاجل</div>

        <!-- News Feed (scrollable, shows 3 rows then scroll) -->
        <div class="news-list-wrap" id="news-feed">
            <!-- Populated by main.js -->
            <div style="color:var(--t-muted); text-align:center; padding:20px; font-size:12px;">
                <i class="fas fa-circle-notch fa-spin" style="margin-left:6px;"></i>
                جاري التحميل...
            </div>
        </div>
    </section>

    <!-- ─── LIVE STREAMS ─── -->
    <section class="tv-section">
        <div class="tv-section-head">
            <div class="tv-nav-arrows">
                <div class="tv-arrow glass" id="tv-left"><i class="fas fa-chevron-right"></i></div>
                <div class="tv-arrow glass" id="tv-right"><i class="fas fa-chevron-left"></i></div>
            </div>
            <span class="tv-section-title">البث المباشر</span>
        </div>
        <div class="tv-carousel" id="tv-carousel">
            <!-- Cards injected by main.js -->
        </div>
    </section>

    <!-- ─── WIDGETS GRID ─── -->
    <div class="widgets-grid">

        <!-- Gold & Currencies -->
        <div class="w-card glass" id="w-market">
            <span class="w-badge">T7</span>
            <span class="w-title">الذهب والعملات</span>
            <div class="w-body" id="market-body">
                <div class="market-price" id="market-price">—</div>
                <div class="market-change" id="market-change">ذهب / دولار أمريكي</div>
            </div>
        </div>

        <!-- World Clocks -->
        <div class="w-card glass" id="w-clocks">
            <span class="w-badge">T7</span>
            <span class="w-title">توقيت العالم</span>
            <div class="w-body" id="clocks-body"></div>
        </div>

        <!-- Movement Tracker (placeholder) -->
        <div class="w-card glass">
            <span class="w-badge">T7</span>
            <span class="w-title">تتبع التحركات</span>
            <div class="w-body" style="background:rgba(255,112,26,0.04); border-radius:8px; align-items:center; justify-content:center;">
                <i class="fas fa-fighter-jet" style="font-size:28px; color:var(--orange); opacity:0.3;"></i>
            </div>
        </div>

        <!-- Cyber Intelligence (placeholder) -->
        <div class="w-card glass">
            <span class="w-badge">T7</span>
            <span class="w-title">الاستخبارات السيبرانية</span>
            <div class="w-body" style="background:rgba(200,0,0,0.05); border-radius:8px; align-items:center; justify-content:center;">
                <i class="fas fa-shield-halved" style="font-size:28px; color:#c00; opacity:0.35;"></i>
            </div>
        </div>

    </div>
    <!-- end widgets-grid -->

</div>
<!-- end content-area -->

<!-- ═══════════════════════════════════════════
     PiP WINDOW
═══════════════════════════════════════════ -->
<div class="pip-window glass" id="pip-window">
    <div class="pip-close" id="pip-close">✕</div>
    <div id="pip-frame"></div>
</div>

<!-- ═══════════════════════════════════════════
     LAYERS MODAL
═══════════════════════════════════════════ -->
<div class="layers-modal" id="layers-modal">
    <div class="layers-inner glass">
        <span class="layers-close" id="layers-close">
            <i class="fas fa-times"></i>
        </span>
        <h3 style="font-size:16px; font-weight:800; color:var(--copper); margin-bottom:16px;">الطبقات</h3>
        <div id="layers-list">
            <!-- Populated by main.js -->
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════════
     BOTTOM NAV
═══════════════════════════════════════════ -->
<nav class="bottom-nav">
    <a href="#" class="nav-item">
        <i class="fas fa-cog"></i>
        <span>الإعدادات</span>
    </a>
    <a href="#" class="nav-item">
        <i class="fas fa-file-lines"></i>
        <span>التقارير</span>
    </a>
    <a href="#" class="nav-item">
        <i class="fas fa-chart-line"></i>
        <span>المخططات</span>
    </a>
    <a href="#" class="nav-item">
        <i class="fas fa-coins"></i>
        <span>الأصول</span>
    </a>
    <a href="#" class="nav-item">
        <i class="fas fa-newspaper"></i>
        <span>الأخبار</span>
    </a>
    <a href="#" class="nav-item active">
        <i class="fas fa-house"></i>
        <span>الرئيسية</span>
    </a>
</nav>

<!-- ═══════════════════════════════════════════
     SHARED DEPENDENCIES (Desktop Backend)
═══════════════════════════════════════════ -->
<script src="../src/assets/three.min.js"></script>
<script src="../src/assets/globe.gl.min.js"></script>
<script src="../src/data/feeds.js?v=57"></script>
<script src="../src/data/conflicts.js?v=57"></script>
<script src="../src/data/intelligence.js?v=57"></script>
<script src="../src/data/timezones.js?v=57"></script>
<script src="../src/globe.js?v=57"></script>
<script src="../src/widgets/breaking-news.js?v=57"></script>

<!-- Mobile App Brain -->
<script src="main.js?v=57"></script>

</body>
</html>
