<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>راس مرقاب — Mobile V57</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=57">
</head>
<body>

    <!-- ═══ LUX HEADER ═══ -->
    <header class="main-header">
        <div class="header-right">
            <span class="logo-text">راس مرقاب</span>
        </div>
        <div class="header-left">
            <button class="bell-btn glass" id="bell-trigger">
                <i class="fas fa-bell"></i>
            </button>
        </div>
    </header>

    <!-- ═══ GLOBE SECTION ═══ -->
    <section class="globe-section" id="v57-globe-wrap">
        <div id="globe-container"></div>
        
        <div class="globe-controls">
            <button class="pill-btn glass" id="btn-layers">
                <i class="fas fa-layer-group"></i> <span>الطبقات</span>
            </button>
            <div class="pill-btn glass" id="view-toggle">
                <span id="label-3d" class="active">3D</span> | <span id="label-2d">2D</span>
            </div>
            <button class="pill-btn glass" id="btn-hide-map">
                <span>إخفاء الخريطة</span> <i class="fas fa-chevron-up"></i>
            </button>
        </div>
    </section>

    <!-- ═══ MAIN WIDGETS AREA ═══ -->
    <div class="widget-container">
        
        <!-- BREAKING NEWS (AAJAL) -->
        <section class="glass card-aajal">
            <div class="card-top">
                <div class="sync-pill"><i class="fas fa-sync"></i> hard sync <span style="font-size:8px; opacity:0.5;">v57</span></div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="font-weight:800;">الأخبار العاجلة</span>
                    <i class="fas fa-search"></i>
                </div>
            </div>
            <h2 class="urgent-title">عاجل</h2>
            <div id="news-feed-v57" class="news-list">
                <!-- Data linking from Desktop -->
            </div>
        </section>

        <!-- LIVE STREAMS -->
        <section style="margin-bottom:20px;">
            <div class="tv-carousel-title">
               <div style="display:flex; gap:10px; color:var(--text-muted);"><i class="fas fa-chevron-left"></i> <i class="fas fa-chevron-right"></i></div>
               <div style="font-weight:900; font-size:14px;">البث المباشر</div>
            </div>
            <div class="tv-carousel" id="tv-feed-v57">
                <!-- Channels injected via main.js -->
            </div>
        </section>

        <!-- WIDGETS GRID -->
        <section class="widgets-grid">
            <!-- Market -->
            <div class="glass w-card" id="w-market">
                <span class="w-badge">T7</span>
                <span class="w-title">الذهب والعملات</span>
                <div id="market-viz" style="flex:1;"></div>
            </div>
            <!-- Clocks -->
            <div class="glass w-card" id="w-clocks">
                <span class="w-badge">T7</span>
                <span class="w-title">توقيت العالم</span>
                <div id="clocks-viz" style="flex:1;"></div>
            </div>
            <!-- Tracker -->
            <div class="glass w-card">
                <span class="w-badge">T7</span>
                <span class="w-title">تتبع التحركات</span>
                <div style="flex:1; background:rgba(255,112,26,0.05); border-radius:8px; display:flex; align-items:center; justify-content:center;">
                    <i class="fas fa-plane" style="color:var(--lux-orange); opacity:0.4;"></i>
                </div>
            </div>
            <!-- Cyber -->
            <div class="glass w-card">
                <span class="w-badge">T7</span>
                <span class="w-title">الاستخبارات السيبرانية</span>
                <div style="flex:1; background:rgba(255,0,0,0.05); border-radius:8px; display:flex; align-items:center; justify-content:center;">
                    <i class="fas fa-shield-halved" style="color:red; opacity:0.4;"></i>
                </div>
            </div>
        </section>

    </div>

    <!-- ═══ BOTTOM NAV ═══ -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item">
            <i class="fas fa-cog"></i> <span>الإعدادات</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-file-lines"></i> <span>التقارير</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-chart-line"></i> <span>المخططات</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-coins"></i> <span>الأصول</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-newspaper"></i> <span>الأخبار</span>
        </a>
        <a href="#" class="nav-item active">
            <i class="fas fa-house"></i> <span>الرئيسية</span>
        </a>
    </nav>

    <!-- ─── SHARED DEPENDENCIES ─── -->
    <script src="../src/assets/three.min.js"></script>
    <script src="../src/assets/globe.gl.min.js"></script>
    <script src="../src/data/feeds.js?v=57"></script>
    <script src="../src/data/conflicts.js?v=57"></script>
    <script src="../src/data/intelligence.js?v=57"></script>
    <script src="../src/data/timezones.js?v=57"></script>
    <script src="../src/globe.js?v=57"></script>
    <script src="../src/widgets/breaking-news.js?v=57"></script>
    
    <!-- ─── MOBILE BRAIN ─── -->
    <script src="main.js?v=57"></script>

</body>
</html>
