<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>راس مرقاب — V49 REAL</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="mobile.css?v=49">
  
  <!-- Core Dependencies -->
  <script src="../src/assets/three.min.js"></script>
  <script src="../src/assets/globe.gl.min.js"></script>
  <script src="../src/data/feeds.js?v=49"></script>
  <script src="../src/data/conflicts.js?v=49"></script>
  <script src="../src/data/intelligence.js?v=49"></script>
  <script src="../src/data/timezones.js?v=49"></script>
  <script src="../src/globe.js?v=49"></script>
  <script src="../src/widgets/breaking-news.js?v=49"></script>
</head>
<body class="mobile-v49">

  <main class="app-container">
    
    <!-- ═══ TOP 34dvh: THE GLOBE ═══ -->
    <section class="top-third" id="top-third-wrap">
      <header class="mobile-header">
        <div class="header-left">
            <button class="bell-btn" id="bell-trigger">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            </button>
        </div>
        <div class="header-right">
            <img src="../public/logo.png" class="header-logo" alt="Logo">
            <div id="show-map-bookmark" class="show-map hidden">عرض الخريطة</div>
        </div>
      </header>

      <div id="globe-container" style="position:absolute; inset:0; z-index:1;"></div>

      <div class="globe-controls">
        <div class="left-controls">
            <button class="glass-pill layers-btn" id="btn-layers">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 16L1 9l11-7 11 7-11 7zm0 2.3l9-5.7v2.3l-9 5.8-9-5.8v-2.3l9 5.7z"/></svg>
                <span>الطبقات</span>
            </button>
        </div>
        <div class="right-controls">
            <div class="m-toggle">
                <button class="m-btn active" id="btn-3d">3D</button>
                <button class="m-btn" id="btn-2d">2D</button>
            </div>
            <button class="glass-pill hide-map-btn" id="btn-hide-map">
                <span>اخفاء الخريطة</span>
                <svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor" style="transform:rotate(180deg)"><path d="M7 10l5 5 5-5z"/></svg>
            </button>
        </div>
      </div>
    </section>

    <!-- ═══ MIDDLE 31dvh: NEWS ═══ -->
    <section class="mid-third">
      <div class="news-box">
        <div class="news-header">
           <div style="font-size:9px; color:#555; position:relative; right:-5px;" onclick="location.reload(true)">SYNC ▾</div>
           <h2 class="news-title">عاجل</h2>
        </div>
        <div id="breaking-news-body" class="news-scroll">
            <!-- Dyn. -->
        </div>
      </div>
    </section>

    <!-- ═══ BOTTOM 35dvh: TV & WIDGETS ═══ -->
    <section class="bot-third">
      <!-- TV Carousel -->
      <div class="tv-section">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; padding:0 2px;">
              <div style="display:flex; gap:8px; color:#555; font-size:10px;"><span>&gt;</span><span>&lt;</span></div>
              <div style="font-size:10px; font-weight:900; color:#555; text-align:right;">البث المباشر</div>
          </div>
          <div class="tv-scroll" id="tv-carousel">
             <!-- Dyn. -->
          </div>
      </div>

      <!-- Widgets Grid -->
      <div class="widgets-box">
        <div class="w-card">
            <div class="w-head"><span>الذهب والعملات</span> <span style="color:var(--accent)">T7</span></div>
            <div id="widget-market" style="flex:1; background:rgba(255,112,26,0.02); border-radius:12px;"></div>
        </div>
        <div class="w-card">
            <div class="w-head"><span>توقيت العالم</span> <span style="color:var(--accent)">T7</span></div>
            <div id="widget-clocks" style="font-size:10px;"></div>
        </div>
        <div class="w-card">
            <div class="w-head"><span>تتبع التحركات</span> <span style="color:var(--accent)">T7</span></div>
            <div style="flex:1; background:#000; border-radius:10px; overflow:hidden;">
                <img src="https://api.placeholder.com/150/100" style="width:100%; height:100%; object-fit:cover; opacity:0.2;">
            </div>
        </div>
        <div class="w-card">
            <div class="w-head"><span>الاستخبارات</span> <span style="color:var(--accent)">T7</span></div>
            <div style="flex:1; background:radial-gradient(circle, var(--accent) 0%, transparent 75%); opacity:0.1;"></div>
        </div>
      </div>
    </section>

    <!-- Footer Nav -->
    <nav class="footer-nav">
      <div class="f-item"><span>الإعدادات</span></div>
      <div class="f-item"><span>التقارير</span></div>
      <div class="f-item"><span>المخططات</span></div>
      <div class="f-item"><span>الأصول</span></div>
      <div class="f-item"><span>الأخبار</span></div>
      <div class="f-item active"><span>الرئيسية</span></div>
    </nav>

  </main>

  <!-- Layers Modal -->
  <div id="layers-modal" class="l-modal hidden news-box">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:10px; margin-bottom:12px;">
      <span style="color:var(--accent); font-weight:900; font-size:16px;">الطبقات</span>
      <span id="close-layers" style="font-size:28px; cursor:pointer;">×</span>
    </div>
    <div id="layers-list"></div>
  </div>

  <script src="mobile.js?v=49"></script>
</body>
</html>
