<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>راس مرقاب — V54 MOCKUP-TRUE</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="mobile.css?v=54">
  
  <!-- Core Dependencies -->
  <script src="../src/assets/three.min.js"></script>
  <script src="../src/assets/globe.gl.min.js"></script>
  <script src="../src/data/feeds.js?v=54"></script>
  <script src="../src/data/conflicts.js?v=54"></script>
  <script src="../src/data/intelligence.js?v=54"></script>
  <script src="../src/data/timezones.js?v=54"></script>
  <script src="../src/globe.js?v=54"></script>
  <script src="../src/widgets/breaking-news.js?v=54"></script>
</head>
<body class="mobile-v54">

  <main class="app-container">
    
    <!-- ═══ TOP 34vh: THE GLOBE ═══ -->
    <section class="top-third" id="top-third-wrap">
      <header class="mobile-header">
        <div class="header-left">
            <button class="bell-btn" id="bell-trigger">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            </button>
        </div>
        <div class="header-right">
            <img src="../public/logo.png" class="header-logo" alt="Logo">
            <div id="show-map-bookmark" class="show-map hidden">عرض الخريطة ▾</div>
        </div>
      </header>

      <div id="globe-container" style="position:absolute; inset:0; z-index:1;"></div>

      <div class="globe-controls">
        <div class="left-controls">
            <button class="glass-pill layers-btn" id="btn-layers" style="color:#ff701a">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 16L1 9l11-7 11 7-11 7zm0 2.3l9-5.7v2.3l-9 5.8-9-5.8v-2.3l9 5.7z"/></svg>
                <span>الطبقات</span>
            </button>
        </div>
        <div class="right-controls">
            <div class="m-toggle">
                <button class="m-btn active" id="btn-3d">3D</button>
                <button class="m-btn" id="btn-2d">2D</button>
            </div>
            <button class="glass-pill hide-map-btn" id="btn-hide-map">
                <span>اخفاء الخريطة</span>
                <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" style="transform:rotate(180deg)"><path d="M7 10l5 5 5-5z"/></svg>
            </button>
        </div>
      </div>
    </section>

    <!-- ═══ MIDDLE 31vh: NEWS ═══ -->
    <section class="mid-third">
      <div class="news-box">
        <div class="news-header">
           <div class="hard-sync" id="hard-sync-launch" style="font-family: monospace;">
             <span>↺</span> hard sync <span style="opacity:0.4; font-size:8px; margin-left:4px;">v54</span>
           </div>
           <h2 class="news-title">الأخبار العاجلة</h2>
        </div>
        <div id="breaking-news-body" class="news-scroll">
            <!-- Dynamic Content -->
        </div>
      </div>
    </section>

    <!-- ═══ BOTTOM: TV & WIDGETS ═══ -->
    <section class="bot-third">
      <div class="tv-section">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <div style="display:flex; gap:10px; color:#444; font-size:11px;"><span>&gt;</span><span>&lt;</span></div>
              <div style="font-size:11px; font-weight:950; color:#888; text-align:right;">البث المباشر</div>
          </div>
          <div class="tv-scroll" id="tv-carousel">
             <!-- Dynamic Content -->
          </div>
      </div>

      <div class="widgets-box">
        <div class="w-card">
            <div class="w-head"><span>الأسواق العالمية</span> <span style="color:var(--lux-orange)">LIVE</span></div>
            <div id="widget-market" style="flex:1;"></div>
        </div>
        <div class="w-card">
            <div class="w-head"><span>تعدين توقيت العواصم</span> <span style="color:var(--lux-orange)">REAL</span></div>
            <div id="widget-clocks"></div>
        </div>
      </div>
    </section>

    <!-- Footer Nav -->
    <nav class="footer-nav">
      <div class="f-item"><span>إعدادات</span></div>
      <div class="f-item"><span>تقارير</span></div>
      <div class="f-item"><span>مخططات</span></div>
      <div class="f-item"><span>أصول</span></div>
      <div class="f-item"><span>أخبار</span></div>
      <div class="f-item active"><span>الرئيسية</span></div>
    </nav>

  </main>

  <div id="layers-modal" class="l-modal hidden news-box" style="z-index:99999; top:10%; bottom:10%; left:10px; right:10px;">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:15px; margin-bottom:15px;">
      <span style="color:var(--lux-orange); font-weight:900; font-size:18px;">إعدادات الطبقات</span>
      <span id="close-layers" style="font-size:32px; cursor:pointer; color:#666;">×</span>
    </div>
    <div id="layers-list" style="overflow-y:auto; flex:1;"></div>
  </div>

  <script src="mobile.js?v=54"></script>
</body>
</html>
