<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>راس مرقاب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Leaflet for 2D map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="style.css?v=577">
</head>
<body>

<!-- ═══ FLOATING TRANSPARENT HEADER ═══ -->
<header class="site-header" id="site-header">
    <div class="bell-wrap">
        <button class="bell-btn" id="bell-btn"><i class="fas fa-bell"></i></button>
        <div class="notif-dropdown glass" id="notif-panel">
            <h4>إعدادات الإشعارات</h4>
            <div class="notif-row"><label>المرئية</label><label class="sw"><input type="checkbox" checked id="sw-visual"><div class="sw-track"></div></label></div>
            <div class="notif-row"><label>الصوتية</label><label class="sw"><input type="checkbox" checked id="sw-audio"><div class="sw-track"></div></label></div>
        </div>
    </div>
    <div class="header-right">
        <img src="../public/logo.png" alt="راس مرقاب" class="site-logo"
             onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'">
        <span id="logo-fallback" style="display:none;font-size:22px;font-weight:900;color:var(--copper);">راس مرقاب</span>
        <!-- Show-map button — lives under logo, hidden by default, shown via body.map-hidden CSS -->
        <button class="show-map-hdr" id="show-map-btn">
            <i class="fas fa-bookmark"></i> عرض الخريطة
        </button>
    </div>
</header>

<!-- ═══ GLOBE SECTION ═══ -->
<section class="globe-section" id="globe-section">
    <div id="globe-container"></div>
    <div id="map-container" class="hidden"></div>
    <!-- Controls -->
    <div class="globe-controls">
        <div class="g-row">
            <button class="gpill" id="pill-layers"><i class="fas fa-layer-group"></i> الطبقات</button>
            <!-- .dimension-toggle + data-dim = globe.js initDimensionToggle() API -->
            <div class="dimension-toggle gpill-grp">
                <button class="dim-btn active" data-dim="3d">3D</button>
                <button class="dim-btn" data-dim="2d">2D</button>
            </div>
        </div>
        <div class="g-row">
            <button class="gpill gpill-wide" id="pill-hidemap">إخفاء الخريطة <i class="fas fa-chevron-up"></i></button>
        </div>
    </div>
</section>

<!-- ═══ LAYERS PANEL ═══ -->
<div class="layers-panel" id="layers-panel">
    <div class="layers-inner glass">
        <div class="layers-hdr">
            <span>الطبقات</span>
            <button class="layers-close" id="layers-close"><i class="fas fa-times"></i></button>
        </div>
        <div id="layers-list"></div>
    </div>
</div>
<div class="layers-backdrop" id="layers-backdrop"></div>

<!-- ═══ BREAKING NEWS ═══ -->
<section class="news-card glass">
    <div class="news-card-top">
        <button class="sync-btn" id="sync-btn"><i class="fas fa-sync-alt"></i> hard sync</button>
        <div class="news-card-title"><i class="fas fa-search"></i> الأخبار العاجلة ▾</div>
    </div>
    <div class="urgent">عاجل</div>
    <div class="news-scroll" id="news-feed">
        <div class="loading-row"><i class="fas fa-circle-notch fa-spin"></i> جاري التحميل...</div>
    </div>
</section>

<!-- ═══ LIVE TV ═══ -->
<section class="tv-section">
    <div class="tv-hdr">
        <div class="tv-arrows">
            <button class="tv-arrow glass" id="tv-left"><i class="fas fa-chevron-right"></i></button>
            <button class="tv-arrow glass" id="tv-right"><i class="fas fa-chevron-left"></i></button>
        </div>
        <span class="tv-title">البث المباشر</span>
    </div>
    <div class="tv-row" id="tv-carousel"></div>
</section>

<!-- ═══ WIDGETS ═══ -->
<div class="widgets-grid">
    <div class="w-card glass"><span class="w-badge">T7</span><span class="w-title">الذهب والعملات</span><div class="w-body" id="market-body"><div class="loading-row" style="font-size:10px;"><i class="fas fa-circle-notch fa-spin"></i></div></div></div>
    <div class="w-card glass"><span class="w-badge">T7</span><span class="w-title">توقيت العالم</span><div class="w-body" id="clocks-body"></div></div>
    <div class="w-card glass"><span class="w-badge">T7</span><span class="w-title">تتبع التحركات</span><div class="w-body" style="align-items:center;justify-content:center;"><i class="fas fa-fighter-jet" style="font-size:24px;color:var(--orange);opacity:.25;"></i></div></div>
    <div class="w-card glass"><span class="w-badge">T7</span><span class="w-title">الاستخبارات السيبرانية</span><div class="w-body" style="align-items:center;justify-content:center;"><i class="fas fa-shield-halved" style="font-size:24px;color:#c00;opacity:.3;"></i></div></div>
</div>

<!-- ═══ PiP ═══ -->
<div class="pip-window glass" id="pip-window">
    <div class="pip-close" id="pip-close">✕</div>
    <div id="pip-frame"></div>
</div>

<!-- ═══ NEWS POPUP ═══ -->
<div class="news-modal" id="news-modal">
    <div class="news-modal-inner glass">
        <button class="nm-close" id="news-modal-close">✕</button>
        <img id="nm-media" class="nm-img" src="" alt="">
        <div class="nm-meta">
            <img id="nm-logo" class="nm-logo-img" src="" alt="">
            <span id="nm-source"></span>
            <span id="nm-time" style="margin-right:auto;color:var(--orange);font-size:10px;"></span>
        </div>
        <div id="nm-title" class="nm-title-text"></div>
        <a id="nm-link" class="nm-link-btn" target="_blank" rel="noopener">قراءة المزيد ←</a>
    </div>
</div>

<!-- ═══ BOTTOM NAV ═══ -->
<nav class="bottom-nav">
    <a href="#" class="nav-item"><i class="fas fa-cog"></i><span>الإعدادات</span></a>
    <a href="#" class="nav-item"><i class="fas fa-file-lines"></i><span>التقارير</span></a>
    <a href="#" class="nav-item"><i class="fas fa-chart-line"></i><span>المخططات</span></a>
    <a href="#" class="nav-item"><i class="fas fa-coins"></i><span>الأصول</span></a>
    <a href="#" class="nav-item"><i class="fas fa-newspaper"></i><span>الأخبار</span></a>
    <a href="#" class="nav-item active"><i class="fas fa-house"></i><span>الرئيسية</span></a>
</nav>

<!-- ═══ SCRIPTS ═══ -->
<script src="../src/assets/three.min.js"></script>
<script src="../src/assets/globe.gl.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../src/data/feeds.js?v=577"></script>
<script src="../src/data/conflicts.js?v=577"></script>
<script src="../src/data/intelligence.js?v=577"></script>
<script src="../src/data/timezones.js?v=577"></script>
<script src="../src/globe.js?v=577"></script>
<script src="../src/widgets/breaking-news.js?v=577"></script>
<script src="main.js?v=577"></script>
</body>
</html>
