<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>راس مرقاب — V45 DASHBOARD</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="mobile.css?v=45">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  
  <script src="../src/assets/three.min.js"></script>
  <script src="../src/assets/globe.gl.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <script src="../src/data/feeds.js?v=45"></script>
  <script src="../src/data/conflicts.js?v=45"></script>
  <script src="../src/data/intelligence.js?v=45"></script>
  <script src="../src/data/timezones.js?v=45"></script>
  <script src="../src/globe.js?v=45"></script>
  <script src="../src/widgets/breaking-news.js?v=45"></script>
</head>
<body class="mobile-v45">

  <!-- ═══ TOP THIRD: GLOBE ═══ -->
  <section class="top-third" id="globe-section">
    <header class="mobile-header">
      <div class="header-left">
        <div class="notif-btn">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12 22a2.01 2.01 0 002-2h-4a2.01 2.01 0 002 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        </div>
      </div>
      <div class="header-right" id="logo-trigger">
        <img src="../public/logo.png" class="header-logo" alt="Logo">
        <div id="show-map-bookmark" class="show-map-bookmark hidden">عرض الخريطة</div>
      </div>
    </header>

    <div id="globe-container" style="position:absolute; inset:0; z-index:-1;"></div>
    <div id="map-container" class="hidden" style="position:absolute; inset:0; z-index:-1;"></div>

    <div class="globe-controls">
      <!-- LEFR: Layers -->
      <div class="left-controls">
          <button class="layers-btn" id="btn-layers">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 16L1 9l11-7 11 7-11 7zm0 2.3l9-5.7v2.3l-9 5.8-9-5.8v-2.3l9 5.7z"/></svg>
              <span>الطبقات</span>
          </button>
      </div>

      <!-- RIGHT: 2D/3D + Hide -->
      <div class="right-controls">
        <div class="mode-toggle">
            <button class="mode-btn active" id="btn-3d">3D</button>
            <button class="mode-btn" id="btn-2d">2D</button>
        </div>
        <button class="hide-map-btn" id="btn-hide-map">
            <span>Hide Map</span>
            <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" style="transform:rotate(180deg)"><path d="M7 10l5 5 5-5z"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- ═══ MID THIRD: NEWS ═══ -->
  <section class="mid-third">
    <div class="dashboard-glass news-dashboard" style="padding:15px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div style="display:flex; align-items:center; gap:8px; color:#666; font-size:11px; font-weight:800;" onclick="location.reload(true)">
           <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
           <span>hard sync</span>
        </div>
        <div style="color:var(--accent); font-size:13px; font-weight:900;">الأخبار العاجلة ▾</div>
      </div>
      <h2 style="color:var(--accent); font-size:20px; font-weight:900; margin:0 0 10px 0; text-align:right;">عاجل</h2>
      <div id="breaking-news-body" class="news-scroll-zone">
        <!-- Rendered via JS -->
      </div>
    </div>
  </section>

  <!-- ═══ BOT THIRD: WIDGETS ═══ -->
  <section class="bot-third">
    
    <!-- TV CAROUSEL -->
    <div style="margin-bottom:15px;">
      <div style="text-align:right; font-size:12px; font-weight:900; color:#888; margin-bottom:8px;">البث المباشر</div>
      <div class="tv-carousel" id="tv-carousel" style="display:flex; gap:10px; overflow-x:auto;">
         <!-- Dyn. -->
      </div>
    </div>

    <!-- 2-COL GRID -->
    <div class="widgets-grid">
      <!-- Market -->
      <div class="dashboard-glass widget-card">
        <div class="widget-title">
            <span class="w-accent">T7</span>
            <span>الذهب والعملات</span>
        </div>
        <div id="widget-market-mini" style="flex:1; background:rgba(255,112,26,0.05); border-radius:10px;"></div>
      </div>
      
      <!-- Clocks -->
      <div class="dashboard-glass widget-card">
        <div class="widget-title">
            <span class="w-accent">T7</span>
            <span>توقيت العالم</span>
        </div>
        <div id="widget-clocks-mini" style="font-size:11px;"></div>
      </div>

      <!-- Tracer -->
      <div class="dashboard-glass widget-card">
        <div class="widget-title">
            <span class="w-accent">T7</span>
            <span>تتبع التحركات</span>
        </div>
        <div style="flex:1; background:#111; border-radius:8px; overflow:hidden;">
            <img src="https://api.placeholder.com/100/100" style="width:100%; height:100%; object-fit:cover; opacity:0.4;">
        </div>
      </div>

      <!-- Cyber -->
      <div class="dashboard-glass widget-card">
        <div class="widget-title">
            <span class="w-accent">T7</span>
            <span>الاستخبارات السيبرانية</span>
        </div>
        <div style="flex:1; background:radial-gradient(circle, var(--accent) 0%, transparent 60%); opacity:0.2;"></div>
      </div>
    </div>
  </section>

  <!-- Layers Modal -->
  <div id="layers-modal" class="layers-modal hidden dashboard-glass" style="position:fixed; top:20%; left:15px; right:15px; max-height:50vh; overflow-y:auto; padding:20px; z-index:5000;">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px; margin-bottom:15px;">
      <span style="color:var(--accent); font-weight:900;">الطبقات</span>
      <span id="close-layers" style="font-size:24px; cursor:pointer;">×</span>
    </div>
    <div id="layers-list"></div>
  </div

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="nav-item"><span>الإعدادات</span></div>
    <div class="nav-item"><span>التقارير</span></div>
    <div class="nav-item"><span>المخططات</span></div>
    <div class="nav-item"><span>الأصول</span></div>
    <div class="nav-item"><span>الأخبار</span></div>
    <div class="nav-item active"><span>الرئيسية</span></div>
  </nav>

  <!-- Video Floating Mode -->
  <div id="video-pip-window"></div>

  <script src="mobile.js?v=45"></script>
</body>
</html>
