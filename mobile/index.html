<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>راس مرقاب — V46 ULTRA-FIDELITY</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="mobile.css?v=46">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  
  <script src="../src/assets/three.min.js"></script>
  <script src="../src/assets/globe.gl.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <script src="../src/data/feeds.js?v=46"></script>
  <script src="../src/data/conflicts.js?v=46"></script>
  <script src="../src/data/intelligence.js?v=46"></script>
  <script src="../src/data/timezones.js?v=46"></script>
  <script src="../src/globe.js?v=46"></script>
  <script src="../src/widgets/breaking-news.js?v=46"></script>
</head>
<body class="mobile-v46">

  <!-- ═══ TOP 33% ═══ -->
  <section class="top-third" id="top-third-wrap">
    
    <header class="mobile-header">
      <div class="header-left">
          <button class="bell-btn" id="bell-trigger">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          </button>
      </div>
      <div class="header-right" id="logo-wrap">
          <img src="../public/logo.png" class="header-logo" alt="Logo">
          <!-- Bookmark précisément sous le logo -->
          <div id="show-map-bookmark" class="show-map-bookmark hidden">عرض الخريطة</div>
      </div>
    </header>

    <div id="globe-container" style="position:absolute; inset:0; z-index:1;"></div>
    <div id="map-container" class="hidden" style="position:absolute; inset:0; z-index:1;"></div>

    <div class="globe-controls">
      <!-- LEFT: Layers -->
      <div class="left-cluster">
          <button class="glass-btn layers-btn" id="btn-layers">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 16L1 9l11-7 11 7-11 7zm0 2.3l9-5.7v2.3l-9 5.8-9-5.8v-2.3l9 5.7z"/></svg>
              <span>الطبقات</span>
          </button>
      </div>

      <!-- RIGHT: Controls -->
      <div class="right-cluster">
          <div class="mode-toggle">
              <button class="mode-btn active" id="btn-3d">3D</button>
              <button class="mode-btn" id="btn-2d">2D</button>
          </div>
          <button class="glass-btn hide-btn" id="btn-hide-map">
              <span>Hide Map</span>
              <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" style="transform:rotate(180deg)"><path d="M7 10l5 5 5-5z"/></svg>
          </button>
      </div>
    </div>
  </section>

  <!-- ═══ MIDDLE 32% ═══ -->
  <section class="mid-third">
    <div class="news-container">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
         <div style="display:flex; align-items:center; gap:6px; color:#555; font-size:10px; font-weight:900;" onclick="location.reload(true)">
             <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
             <span>hard sync</span>
         </div>
         <div style="color:var(--accent); font-size:12px; font-weight:900;">الأخبار العاجلة ▾</div>
      </div>
      <h2 style="color:var(--accent); font-size:22px; font-weight:900; margin:0 0 10px 0; text-align:right;">عاجل</h2>
      <div id="breaking-news-body" class="news-scroll">
          <!-- Dyn. -->
      </div>
    </div>
  </section>

  <!-- ═══ BOTTOM 35% ═══ -->
  <section class="bot-third">
    <!-- Stream Carousel -->
    <div style="margin-bottom:15px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <div style="display:flex; gap:5px;">
                <span style="width:16px; height:16px; background:rgba(255,255,255,0.05); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:10px;">&gt;</span>
                <span style="width:16px; height:16px; background:rgba(255,255,255,0.05); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:10px;">&lt;</span>
            </div>
            <div style="text-align:right; font-size:12px; font-weight:800; color:#666;">البث المباشر</div>
        </div>
        <div class="tv-carousel" id="tv-carousel" style="display:flex; gap:12px; overflow-x:auto; padding-bottom:5px;">
           <!-- Dyn. -->
        </div>
    </div>

    <!-- Widgets -->
    <div class="widgets-grid">
      <div class="news-container widget-card" style="grid-column: span 1;">
          <div class="widget-title"><span style="color:var(--accent)">T7</span> الذهب والعملات</div>
          <div id="widget-market" style="flex:1; background:rgba(255,112,26,0.02); border-radius:12px;"></div>
      </div>
      <div class="news-container widget-card" style="grid-column: span 1;">
          <div class="widget-title"><span style="color:var(--accent)">T7</span> توقيت العالم</div>
          <div id="widget-clocks" style="font-size:11px;"></div>
      </div>
      <div class="news-container widget-card" style="grid-column: span 1;">
          <div class="widget-title"><span style="color:var(--accent)">T7</span> تتبع التحركات</div>
          <div style="flex:1; background:#000; border-radius:10px; overflow:hidden;">
              <img src="https://api.placeholder.com/150/100" style="width:100%; height:100%; object-fit:cover; opacity:0.3;">
          </div>
      </div>
      <div class="news-container widget-card" style="grid-column: span 1;">
          <div class="widget-title"><span style="color:var(--accent)">T7</span> الاستخبارات السيبرانية</div>
          <div style="flex:1; background:radial-gradient(circle, var(--accent) 0%, transparent 65%); opacity:0.15;"></div>
      </div>
    </div>
  </section>

  <!-- Layers Modal -->
  <div id="layers-modal" class="layers-modal hidden news-container">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:12px; margin-bottom:15px;">
      <span style="color:var(--accent); font-weight:900;">الطبقات</span>
      <span id="close-layers" style="font-size:26px; cursor:pointer;">×</span>
    </div>
    <div id="layers-list"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="nav-item"><span>الإعدادات</span></div>
    <div class="nav-item"><span>التقارير</span></div>
    <div class="nav-item"><span>المخططات</span></div>
    <div class="nav-item"><span>الأصول</span></div>
    <div class="nav-item"><span>الأخبار</span></div>
    <div class="nav-item active"><span>الرئيسية</span></div>
  </nav>

  <script src="mobile.js?v=46"></script>
</body>
</html>
