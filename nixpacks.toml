[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
    "npm install",
    "curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11",
    "python3.11 -m pip install -r requirements.txt",
    "npx playwright install chromium --with-deps"
]

[start]
cmd = "node proxy.js"
